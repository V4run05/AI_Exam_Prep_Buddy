extract_modules_and_topics:
  description: |
    You are given the following syllabus text:
    {syllabus_text}
    Carefully read this text and extract all modules and their topics, exactly as they appear in the syllabus. Do not invent or assume any content.
  input:
    syllabus_pdf: ""
    syllabus_text: ""
  expected_output: |
    A structured list or dictionary of modules and their topics, strictly based on the provided syllabus text.
  agent: syllabus_analyzer

categorize_materials_by_filename:
  description: |
    You are given a list of filenames from the materials folder:
    {categorized_materials}
    Categorize each file into the most relevant module/topic based on its filename or known keywords. If the file appears to be a textbook or reference, assign it to the "Textbooks" or "Others" category. Only if the filename does not match any module or topic, recommend content analysis for further categorization.
  input:
    materials_folder: ""
    categorized_materials: ""
  expected_output: |
    A mapping of each file to the most relevant module/topic, or to "Textbooks"/"Others" if appropriate, based strictly on the filename and known keywords.
  agent: material_categorizer
