extract_modules_and_topics:
  description: |
    You are given the following syllabus text:
    {syllabus_text}
    Carefully read this text and extract all modules and their topics, exactly as they appear in the syllabus. Do not invent or assume any content.
  input:
    syllabus_pdf: ""
    syllabus_text: ""
  expected_output: |
    A structured list or dictionary of modules and their topics, strictly based on the provided syllabus text.
  agent: syllabus_analyzer

extract_material_content:
  description: |
    For each file in the provided materials folder, here is the extracted content:
    {extracted_materials}
    Output the actual extracted content for each file. Do not summarize or invent content.
  input:
    materials_folder: ""
    extracted_materials: ""
  expected_output: |
    A mapping of each file name to its extracted text and images, using only the real file content.
  agent: material_extractor

categorize_materials_by_module:
  description: |
    Using the modules/topics and extracted materials provided as input, match each file or section to the correct module/topic. Only use the provided content for your decisions. Do not invent or assume any information.
  input:
    modules_and_topics: modules_and_topics
    extracted_materials: extracted_materials
  expected_output: |
    A mapping of each file (or section) to the most relevant module/topic, based strictly on the real extracted content and syllabus structure.
  agent: material_categorizer
